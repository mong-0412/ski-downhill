<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a347d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>씽씽 스키</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell" aria-label="씽씽 스키 게임">
    <canvas id="game" aria-label="플레이 가능한 다운힐 스키 게임 캔버스"></canvas>

    <section class="hud" aria-label="점수판">
      <div class="metric metric-score">
        <span>SCORE</span>
        <strong><span id="score">0</span></strong>
      </div>
      <div class="metric metric-best">
        <span>BEST</span>
        <strong><span id="best">0</span></strong>
      </div>
      <div class="metric metric-speed">
        <span>KM/H</span>
        <strong><span id="speed">0</span></strong>
      </div>
    </section>

    <section class="itembar" aria-label="아이템 상태">
      <div class="item-pill bonus-pill">
        <img class="item-icon snow-icon" src="./assets/snowflake-pickup.png" alt="">
        <span class="item-copy">
          <span>BONUS</span>
          <strong>+<span id="bonus">0</span></strong>
        </span>
      </div>
      <div class="item-pill" id="shieldPill">
        <svg class="item-icon shield-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2.5 20 6v5.4c0 5.1-3.2 8.4-8 10.1-4.8-1.7-8-5-8-10.1V6l8-3.5Z"/>
          <path d="m8.7 12 2.1 2.1 4.6-4.7"/>
        </svg>
        <span class="item-copy">
          <span>SHIELD</span>
          <strong>×<span id="shield">0</span></strong>
        </span>
      </div>
      <button class="item-pill sound-toggle" id="soundToggle" type="button" aria-label="효과음 켜짐" aria-pressed="true">
        <span class="sound-icon" id="soundIcon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path class="speaker-body" d="M4 9h4l5-4v14l-5-4H4V9Z"/>
            <path class="sound-waves" d="M16 9.2c1.3 1.5 1.3 4.1 0 5.6M18.7 6.7c3.1 3 3.1 7.6 0 10.6"/>
            <path class="sound-slash" d="m5 4 14 16"/>
          </svg>
        </span>
      </button>
    </section>

    <section class="overlay is-splash" id="overlay">
      <div class="brand-hero" aria-hidden="true">
        <div class="brand-speed-lines"><i></i><i></i><i></i></div>
        <div class="brand-wordmark">
          <strong>SSING</strong>
          <span>SKI DOWNHILL</span>
          <small>RAPID DESCENT</small>
        </div>
        <img src="./assets/skier-straight.png" alt="">
      </div>

      <div class="overlay-panel">
        <header class="overlay-copy" aria-live="polite" aria-atomic="true">
          <p class="eyebrow" id="overlayKicker">HOW TO RIDE</p>
          <h1 id="overlayTitle">씽씽 스키</h1>
          <p id="overlayText">터치한 쪽의 반대 방향으로 카빙하세요.</p>
        </header>

        <div class="control-guide" aria-label="조작 방법">
          <div class="control-step">
            <span class="touch-key">LEFT</span>
            <span class="control-arrow" aria-hidden="true">→</span>
            <strong>오른쪽 카빙</strong>
          </div>
          <div class="control-step">
            <span class="touch-key">RIGHT</span>
            <span class="control-arrow" aria-hidden="true">←</span>
            <strong>왼쪽 카빙</strong>
          </div>
          <p>양쪽을 같이 누르면 부스터!</p>
        </div>

        <div class="result-breakdown" aria-label="이번 주행 결과">
          <div>
            <span>주행 점수</span>
            <strong id="distanceResult">0</strong>
          </div>
          <div>
            <span>눈결정</span>
            <strong id="bonusResult">+0</strong>
          </div>
        </div>

        <div class="first-place-prize" id="firstPlacePrize" role="status" aria-live="polite" aria-atomic="true" hidden>
          <span class="first-place-prize-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 10h16v10H4V10Z"/>
              <path d="M3 6h18v4H3V6ZM12 6v14"/>
              <path d="M12 6H8.8a2.3 2.3 0 1 1 2.3-2.3L12 6Zm0 0h3.2a2.3 2.3 0 1 0-2.3-2.3L12 6Z"/>
            </svg>
          </span>
          <p><strong>축하드립니다!!</strong> SSING 부스로 오셔서 키캡 키링을 받아가세요!!</p>
        </div>

        <div class="leaderboard-panel" aria-label="리더보드">
          <div class="leaderboard-head">
            <span class="ranking-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 4h10v4c0 3.2-2 5.8-5 6.8C9 13.8 7 11.2 7 8V4Z"/>
                <path d="M7 6H4v1c0 2.2 1.3 3.8 3.4 4.2M17 6h3v1c0 2.2-1.3 3.8-3.4 4.2M12 15v3M8.5 21h7"/>
              </svg>
            </span>
            <strong>SSING RANKING</strong>
            <button id="refreshLeaderboard" type="button" aria-label="랭킹 새로고침" title="랭킹 새로고침">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19.2 8A8 8 0 1 0 20 14M19.2 8V3.8M19.2 8H15"/>
              </svg>
            </button>
          </div>
          <ol class="leaderboard-list" id="leaderboardList">
            <li class="is-empty">기록 확인 중...</li>
          </ol>
          <p class="leaderboard-status" id="leaderboardStatus"></p>
        </div>

        <form class="player-form" id="playerForm">
          <div class="name-field">
            <label for="nickname">SKIER NAME</label>
            <input id="nickname" name="nickname" type="text" maxlength="12" autocomplete="nickname" inputmode="text" placeholder="이름을 정해 주세요">
          </div>
          <button id="startButton" type="submit">
            <span>슬로프 출발!</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h13M13 6l6 6-6 6"/>
            </svg>
          </button>
        </form>
      </div>
    </section>

    <section class="rotate-warning" aria-label="세로 화면 안내">
      <div>
        <h2>세로로 돌려주세요</h2>
        <p>이 게임은 휴대폰 세로 화면에 맞춰져 있습니다.</p>
      </div>
    </section>
  </main>

  <script src="./config.js" defer></script>
  <script src="./game.js" defer></script>
</body>
</html>
